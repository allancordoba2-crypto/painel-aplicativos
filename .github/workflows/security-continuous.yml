name: Security Continuous

# Roda em todo push/PR e diariamente (auto-updating security every time)
on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  schedule:
    # Todo dia às 09:00 UTC (~06:00 BRT)
    - cron: "0 9 * * *"
  workflow_dispatch:

permissions:
  contents: read
  security-events: write
  actions: read
  pull-requests: write

concurrency:
  group: security-${{ github.ref }}
  cancel-in-progress: true

jobs:
  secret-scan:
    name: Secret scan (patterns)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Scan for hardcoded secrets / tokens
        run: |
          set -euo pipefail
          echo "== Pattern secret scan =="
          # Falha se encontrar padrões de credenciais comuns (exclui docs de exemplo)
          if grep -RInE \
            --exclude-dir=.git \
            --exclude-dir=.github \
            --exclude='*.md' \
            --exclude='security-continuous.yml' \
            -e 'AKIA[0-9A-Z]{16}' \
            -e 'ghp_[A-Za-z0-9]{36}' \
            -e 'github_pat_[A-Za-z0-9_]{20,}' \
            -e 'xox[baprs]-[0-9A-Za-z-]{10,}' \
            -e '-----BEGIN (RSA |OPENSSH |EC )?PRIVATE KEY-----' \
            -e 'api[_-]?key[\"'\'' ]*[:=][\"'\'' ]*[A-Za-z0-9_\-]{16,}' \
            . ; then
            echo "::error::Possíveis segredos encontrados no repositório"
            exit 1
          fi
          echo "OK: nenhum padrão de segredo crítico detectado"

  dependency-hygiene:
    name: Dependency hygiene
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Verify lock / manifest presence
        run: |
          set -euo pipefail
          test -f painel_aplicativos/pubspec.yaml
          echo "pubspec.yaml presente"
          if [ -f requirements.txt ]; then
            echo "requirements.txt presente"
          else
            echo "Sem requirements.txt (OK se Python for stdlib)"
          fi

      - name: Soft check pub outdated (informativo)
        continue-on-error: true
        run: |
          # Flutter não está sempre no runner; apenas documenta estado
          if command -v flutter >/dev/null 2>&1; then
            cd painel_aplicativos && flutter pub outdated || true
          else
            echo "Flutter não instalado no runner — Dependabot cobre updates diários"
          fi

  security-summary:
    name: Security summary artifact
    runs-on: ubuntu-latest
    needs: [secret-scan, dependency-hygiene]
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Write security report
        run: |
          mkdir -p reports
          {
            echo "# Security continuous report"
            echo ""
            echo "- UTC: $(date -u +%Y-%m-%dT%H:%M:%SZ)"
            echo "- Ref: ${{ github.ref }}"
            echo "- SHA: ${{ github.sha }}"
            echo "- Event: ${{ github.event_name }}"
            echo "- Actor: ${{ github.actor }}"
            echo ""
            echo "Checks: secret-scan + dependency-hygiene"
            echo "Dependabot: daily (actions, pub, pip)"
            echo "CodeQL: see workflow codeql.yml"
          } > reports/security-report.md
          cat reports/security-report.md

      - name: Upload report
        uses: actions/upload-artifact@v4
        with:
          name: security-report
          path: reports/security-report.md
          retention-days: 30
